<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Számológép</title>
        <link rel="stylesheet" href="css.css" />
        <script type="module" src="szamologep.js"></script>
       
    </head>
    <body>
        <main>
            <header>Számológép</header>
            <article>
                <section class="kijelzo">
                    <span class="kifejezes"></span
                    ><span class="eredmeny"></span>
                </section>
                <section class="szamok">
                    <button id="1">1</button>
                    <button id="2">2</button>
                    <button id="3">3</button>
                    <button id="4">4</button>
                    <button id="5">5</button>
                    <button id="6">6</button>
                    <button id="7">7</button>
                    <button id="8">8</button>
                    <button id="9">9</button>
                    <button id="0">0</button>
                </section>
                <section class="muvjelek">
                    <button id="osszeadas">+</button>
                    <button id="kivonas">-</button>
                    <button id="szorzas">*</button>
                    <button id="osztas">/</button>
                    <button id=".">.</button>
                    <br />
                    <button id="egyenlo">=</button>
                    <button id="torles">C</button>
                </section>
            </article>
            <footer>Ponauer Maja</footer>
        </main>
    </body>
</html>
